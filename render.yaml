services:
  - type: web
    name: xauusd-signal-engine
    runtime: python
    buildCommand: pip install -r requirements-signal.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WEBHOOK_PORT
        value: "10000"
      - key: AI_MODEL
        value: gpt-4o-mini
      - key: LOG_LEVEL
        value: INFO
      - key: WEB_CONCURRENCY
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.0"
